<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>مفاجأة لحبيبتي هولير</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060607;
      --accent: #d4af37;
    }
    * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { 
      margin: 0; 
      background: radial-gradient(circle at center, #1a1a1a 0%, #060607 100%); 
      color: #eee; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden;
    }

    /* إطار الصورة الملكي */
    .photo-container {
      position: relative;
      width: 250px;
      height: 250px;
      margin-bottom: 40px;
    }
    .photo-frame {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(45deg, var(--accent), #f3e3a8, var(--accent));
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
      animation: pulseGlow 2s infinite alternate;
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg);
    }

    @keyframes pulseGlow {
      from { transform: scale(1); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
      to { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 175, 55, 0.7); }
    }

    /* الزر الفخم */
    .enter-btn {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 16px 45px;
      font-size: 22px;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.5s ease;
      text-decoration: none;
      display: inline-block;
      box-shadow: inset 0 0 0 0 var(--accent);
    }
    .enter-btn:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 30px var(--accent);
      transform: translateY(-5px);
    }

    /* نص ترحيبي بسيط */
    .welcome-text {
      margin-top: 20px;
      color: #999;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="photo-container">
    <div class="photo-frame">
      <img src="photo_31_2025-12-04_23-02-45.jpg" alt="My Love">
    </div>
  </div>

  <a href="mylove.html" class="enter-btn">اكبسي هون يقلبي ✨</a>

  <div class="welcome-text">أنتِ عيدي كل يوم</div>

</body>
</html>
